name: Sync dari Pastebin

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ambil isi terbaru dari Pastebin
        run: curl -sL "https://pastebin.com/raw/KLPzYV4J" -o TV2.m3u

      - name: Commit kalau ada perubahan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TV2.m3u
          git diff --staged --quiet || git commit -m "Auto sync dari Pastebin"
          git push
