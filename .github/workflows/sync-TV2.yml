name: Sync dari SUMBER

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ambil isi terbaru dari SUMBER
        run: curl -sL "https://pastefy.app/zWOi5Sz4/raw" -o TV2.m3u

      - name: Commit kalau ada perubahan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TV2.m3u
          git diff --staged --quiet || git commit -m "Auto sync dari SUMBER"
          git push
